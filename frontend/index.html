<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalKart | Login</title>
  <link rel="stylesheet" href="static/styles.css">
</head>
<body>
  <div id="globalLoader" class="loader"><div class="pulse"></div></div>
  <div class="particles"></div>
  <div class="page-shell">
    <main class="login-wrap">
      <section class="login-card glass reveal">
        <h1>LocalKart</h1>
        <p class="muted">Premium Smart Kitchen Platform</p>
        <input id="loginEmail" type="text" placeholder="Username or email">
        <input id="loginPassword" type="password" placeholder="Password">
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="loginBtn" class="btn btn-neon">Login</button>
          <button id="signupBtn" class="btn btn-outline">Sign Up</button>
        </div>
        <p id="authStatus" class="muted"></p>
      </section>
    </main>
  </div>
  <script src="static/site.js"></script>
  <script src="static/login.js"></script>
</body>
</html>
