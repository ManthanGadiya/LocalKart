<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalKart | Discover</title>
  <link rel="stylesheet" href="static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">LocalKart</a>
    <nav class="navlinks">
      <a href="/">Home</a>
      <a href="/discover">Discover</a>
      <a href="/shops">Shops</a>
      <a href="/materials">Materials</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
    <div class="account-area">
      <button id="accountToggle" class="ghost-btn" type="button">Account</button>
      <div id="authMenu" class="auth-menu hidden">
        <button class="ghost-btn" type="button">Sign Up</button>
        <button class="ghost-btn" type="button">Login</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <h1>Discover Product Varieties</h1>
      <p class="muted">Choose category and product to see top material options and nearby shops.</p>
      <div class="grid two">
        <label>Category
          <select id="categorySelect">
            <option value="">All</option>
          </select>
        </label>
        <label>Product
          <select id="productSelect">
            <option value="">Select product</option>
          </select>
        </label>
      </div>
      <div class="grid two">
        <label>Latitude
          <input id="latInput" type="number" step="0.0001" value="18.5204">
        </label>
        <label>Longitude
          <input id="lngInput" type="number" step="0.0001" value="73.8567">
        </label>
      </div>
      <div class="actions">
        <button id="loadVarietiesBtn" class="cta" type="button">Load Varieties</button>
        <button id="nearbyShopsBtn" class="ghost-btn" type="button">Find Nearby Shops</button>
      </div>
    </section>

    <section class="cards-two">
      <article class="panel">
        <h2>Varieties</h2>
        <div id="varietiesList" class="list"></div>
      </article>
      <article class="panel">
        <h2>Nearby Shops</h2>
        <div id="shopsList" class="list"></div>
      </article>
    </section>
  </main>

  <script src="/static/site.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
