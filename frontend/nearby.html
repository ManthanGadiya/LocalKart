<html lang="en">

      <section class="store-grid reveal" id="storesGrid"></section>
    </main>

    <button id="compareFab" class="btn btn-neon fab" type="button">Compare Now</button>
    <footer class="footer">© 2026 LocalKart - Smart Utensil Guide</footer>
